<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>YMC Stem Mixer</title>
  <style>
    :root{
      --bg:#070a0c; --panel:#10161a; --panel2:#141b20; --line:#2a333a;
      --text:#eef3f7; --muted:#9aa7ae; --cyan:#58dfff; --red:#ff5258;
      --orange:#ff9100; --yellow:#ffd21a; --green:#85d94d;
    }
    *{box-sizing:border-box}
    html,body{width:100%;max-width:100%;overflow-x:hidden}
    body{
      margin:0;background:
      radial-gradient(circle at 15% 10%,rgba(88,223,255,.12),transparent 30%),
      radial-gradient(circle at 85% 20%,rgba(255,210,26,.10),transparent 28%),
      linear-gradient(180deg,#090c0f,#050607);
      color:var(--text);font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;
      overflow-x:hidden;
    }
    .app{width:100%;max-width:100vw;min-height:100vh;padding:5px;display:grid;grid-template-rows:auto 1fr auto;gap:10px}
    .topbar,.transport,.panel,.strip,.master,.master-strip{background:linear-gradient(180deg,rgba(24,33,39,.95),rgba(10,15,18,.96));border:1px solid var(--line);box-shadow:0 0 0 1px rgba(255,255,255,.02) inset,0 14px 50px rgba(0,0,0,.35)}
    .topbar{min-height:58px;border-radius:8px;display:flex;align-items:center;gap:10px;padding:8px 10px;position:sticky;top:0;z-index:5;flex-wrap:wrap}
    .brand{font-weight:900;letter-spacing:.08em;font-size:24px;text-shadow:3px 3px 0 #000;font-family:monospace;white-space:nowrap}
    .brand span{color:var(--red)}
    button,.filebtn{
      background:linear-gradient(180deg,#1d252b,#11171b);border:1px solid #34414a;color:var(--text);
      border-radius:5px;padding:9px 10px;font-weight:800;letter-spacing:.03em;cursor:pointer;
      box-shadow:0 1px 0 rgba(255,255,255,.08) inset;text-transform:uppercase;
    }
    button:hover,.filebtn:hover{border-color:var(--cyan)}
    button.active{background:linear-gradient(180deg,rgba(88,223,255,.25),rgba(88,223,255,.08));border-color:var(--cyan)}
    .danger.active{background:linear-gradient(180deg,rgba(255,82,88,.35),rgba(255,82,88,.08));border-color:var(--red);color:#ffb2b5}
    .spacer{flex:1}
    .main{display:grid;grid-template-columns:120px minmax(0,720px) 120px;justify-content:center;gap:8px;width:100%;min-width:0}
    .panel{border-radius:8px;padding:12px}
    h3{margin:0 0 12px;font-size:14px;letter-spacing:.08em;color:#d8e1e6;text-transform:uppercase;font-weight:700}
    .small{font-size:12px;color:var(--muted)}
    .stem-list{display:grid;gap:10px}
    .import-row{display:grid;grid-template-columns:26px 1fr;gap:8px;align-items:center}
    .badge{height:24px;width:24px;border-radius:3px;display:grid;place-items:center;font-weight:900;color:#111}
    .filebtn{display:block;text-align:center;padding:9px 8px;position:relative;overflow:hidden}
    .filebtn input{position:absolute;inset:0;opacity:0;cursor:pointer}
    .tools{margin-top:12px;display:grid;gap:8px}
    .mixer{display:grid;grid-template-columns:repeat(4,minmax(95px,160px));justify-content:center;gap:6px;min-width:0}
    .strip{border-radius:8px;min-height:690px;padding:10px;display:grid;grid-template-rows:auto auto auto auto 1fr auto;gap:10px;position:relative;overflow:hidden;min-width:0}
    .strip:before{content:"";position:absolute;inset:0 0 auto;height:3px;background:var(--accent)}
    .ch-head{display:flex;align-items:center;gap:10px}
    .ch-title{font-weight:900;letter-spacing:.04em}
    .wave{height:62px;border-bottom:1px solid var(--line);position:relative;background:rgba(0,0,0,.18);border-radius:4px;overflow:hidden}
    canvas{width:100%;height:100%;display:block}
    .filename{font-family:monospace;color:#b8c2c8;font-size:12px;min-height:18px;display:flex;justify-content:space-between}
    .switches{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .knobs{display:grid;gap:12px;justify-items:center}
    .eqrow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%}
    .knobbox{text-align:center;font-size:12px;color:#c7d0d5}
    .knob{
      width:52px;height:52px;border-radius:50%;appearance:none;background:
      radial-gradient(circle at 50% 50%,#20282e 0 43%,#080a0c 45% 58%,transparent 60%),
      conic-gradient(from -135deg,var(--accent) calc((var(--val,50))*1%),#31383e 0 75%,transparent 0);
      border:1px solid #3d474e;transform:rotate(0deg);cursor:pointer;
    }
    .knob::-webkit-slider-thumb{appearance:none;width:10px;height:10px;border-radius:50%;background:#f4f4f4;box-shadow:0 -18px 0 var(--accent)}
    .knob::-moz-range-thumb{width:10px;height:10px;border:0;border-radius:50%;background:#f4f4f4}
    .fader-zone{display:grid;grid-template-columns:42px 1fr 42px;gap:10px;align-items:end;min-height:260px}
    .scale{height:260px;display:flex;flex-direction:column;justify-content:space-between;color:#aeb8be;font-family:monospace;font-size:12px;text-align:right}
    .fader-wrap{height:270px;display:flex;justify-content:center;align-items:center}
    input[type=range].vfader{
      writing-mode:vertical-lr;direction:rtl;width:42px;height:260px;accent-color:var(--accent);cursor:pointer;
    }
    .meter{height:260px;width:22px;border:1px solid #1f282e;background:#060809;display:flex;align-items:end;padding:2px}
    .meter-fill{width:100%;height:0%;background:linear-gradient(0deg,#30d82f 0 55%,#f4e414 55% 78%,#ff8f00 78% 90%,#ff2222 90%);transition:height .06s linear}
    .db{font-family:monospace;text-align:center;background:#080b0d;border:1px solid #20282d;border-radius:4px;padding:7px;color:#fff}
    .right{display:grid;gap:10px;grid-template-rows:auto 1fr}
    .master{border-radius:8px;padding:12px}
    .master-strip{border-radius:8px;min-height:690px;padding:10px;display:grid;grid-template-rows:auto 1fr auto;gap:10px;position:relative;overflow:hidden;min-width:0;--accent:var(--cyan)}
    .master-strip:before{content:"";position:absolute;inset:0 0 auto;height:3px;background:var(--accent)}
    .master-output{display:grid;grid-template-columns:42px 1fr 42px;gap:10px;align-items:end;min-height:260px;margin-top:15px}
    .transport{border-radius:8px;padding:12px;display:grid;grid-template-columns:190px 1fr 140px;gap:14px;align-items:center}
    .play{font-size:26px;color:#92ff55}
    .time{font-family:monospace;font-size:22px;margin-top:8px}
    .arrange{height:145px;background:#080b0d;border:1px solid #263039;border-radius:4px;position:relative;overflow:hidden}
    .gridlines{position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent 0 9.8%,rgba(255,255,255,.08) 10%),repeating-linear-gradient(0deg,transparent 0 24%,rgba(255,255,255,.05) 25%)}
    .playhead{position:absolute;top:0;bottom:0;width:2px;background:white;left:0%}
    .drop{outline:2px dashed var(--cyan);outline-offset:-6px}
    .hidden{display:none}
    @media(max-width:1280px){.main{grid-template-columns:150px minmax(0,1fr) 190px}.mixer{grid-template-columns:repeat(4,minmax(112px,1fr));gap:6px}.strip,.master-strip{padding:8px}.brand{font-size:20px}button,.filebtn{font-size:12px;padding:8px 8px}.fader-zone,.master-output{grid-template-columns:34px 1fr 30px}.scale{font-size:10px}.eqrow{gap:4px}.knob{width:46px;height:46px}}
    @media(max-width:1050px){.main{grid-template-columns:1fr}.mixer{grid-template-columns:repeat(2,1fr)}.right{grid-template-columns:1fr 1fr}.transport{grid-template-columns:1fr}.strip{min-height:640px}}
    @media(max-width:620px){.mixer{grid-template-columns:1fr}.topbar{overflow:auto}.right{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="app" id="app">
  <header class="topbar">
    <div class="brand">YMC <span>MIXER</span></div>
    <button id="importAll">Import Stems</button>
    <button id="saveMix">Save Mix</button>
    <button id="loadMixBtn">Load Mix</button>
    <input id="loadMixFile" class="hidden" type="file" accept="application/json">
    <button id="exportWav">Export WAV</button>
    <div class="spacer"></div>
    <div class="db" id="masterRead">-0.9 dB</div>
  </header>

  <main class="main">
    <aside class="panel">
      <h3>Stems</h3>
      <div class="stem-list" id="stemList"></div>
      <div class="tools">
        <h3>Tools</h3>
        <button id="soloClear">Solo Clear</button>
        <button id="muteClear">Mute Clear</button>
        <button id="resetMix">Reset Mix</button>
      </div>
    </aside>

    <section class="mixer" id="mixer"></section>

    <aside class="right">
      <section class="master-strip">
        <div class="ch-head">
          <div class="badge" style="background:var(--cyan)">M</div>
          <div class="ch-title">MASTER</div>
          <div class="spacer"></div>
        </div>
        <div class="master-output">
          <div class="scale"><span>10</span><span>5</span><span>0</span><span>-5</span><span>-10</span><span>-20</span><span>-30</span><span>-40</span><span>-60</span></div>
          <div class="fader-wrap"><input id="masterVol" class="vfader" type="range" min="0" max="1.5" step=".01" value=".9"></div>
          <div class="meter"><div id="masterMeter" class="meter-fill"></div></div>
        </div>
        <div class="db" id="masterVolRead">-0.9 dB</div>
      </section>
      <section class="master">
        <h3>Loop</h3>
        <button id="loopBtn">Loop</button>
      </section>
    </aside>
  </main>

  <footer class="transport">
    <div>
      <button class="play" id="playBtn">▶</button>
      <button id="stopBtn">■</button>
      <div class="time"><span id="timeNow">00:00.000</span></div>
    </div>
    <div class="arrange"><div class="gridlines"></div><canvas id="overview"></canvas><div class="playhead" id="playhead"></div></div>
    <div>
      <button id="zoomIn">Zoom +</button>
      <button id="zoomOut">Zoom -</button>
    </div>
  </footer>
</div>

<script>
const names=["DRUMS","BASS","VOCALS","OTHER"];
const colors=["#ff5258","#ff9100","#ffd21a","#85d94d"];
const ctx=new (window.AudioContext||window.webkitAudioContext)();

const masterIn=ctx.createGain(), masterOut=ctx.createGain(), analyser=ctx.createAnalyser();
masterOut.gain.value=.9;
masterIn.connect(masterOut);
masterOut.connect(analyser);
analyser.connect(ctx.destination);
analyser.fftSize=512;

let stems=[], startAt=0, pauseAt=0, playing=false, loop=false, zoom=1;
const mixer=document.getElementById("mixer"), stemList=document.getElementById("stemList");

function mkStem(i){
  const accent=colors[i], s={i,name:names[i],color:accent,buffer:null,src:null,solo:false,mute:false,startOffset:0};
  const gain=ctx.createGain(), pan=ctx.createStereoPanner(), low=ctx.createBiquadFilter(), mid=ctx.createBiquadFilter(), high=ctx.createBiquadFilter(), meter=ctx.createAnalyser();
  low.type="lowshelf"; low.frequency.value=180; mid.type="peaking"; mid.frequency.value=1400; mid.Q.value=.9; high.type="highshelf"; high.frequency.value=3500;
  gain.connect(low); low.connect(mid); mid.connect(high); high.connect(pan); pan.connect(meter); meter.connect(masterIn);
  Object.assign(s,{gain,pan,low,mid,high,meter,volume:1});
  stems.push(s);

  stemList.insertAdjacentHTML("beforeend",`<div class="import-row"><div class="badge" style="background:${accent}">${i+1}</div><label class="filebtn">${s.name}<input data-file="${i}" type="file" accept="audio/*"></label></div>`);

  const el=document.createElement("article"); el.className="strip"; el.style.setProperty("--accent",accent);
  el.innerHTML=`
    <div class="ch-head"><div class="badge" style="background:${accent}">${i+1}</div><div class="ch-title">${s.name}</div><div class="spacer"></div></div>
    <div><div class="wave"><canvas class="wavecanvas"></canvas></div><div class="filename"><span>import audio</span><span>00:00</span></div></div>
    <div class="switches"><button class="solo">Solo</button><button class="mute danger">Mute</button></div>
    <div class="knobs">
      <div class="knobbox">PAN<br><input class="knob pan" type="range" min="-1" max="1" step=".01" value="0"></div>
      <div class="eqrow">
        <div class="knobbox">LOW<br><input class="knob eq low" type="range" min="-18" max="18" step=".1" value="0"></div>
        <div class="knobbox">MID<br><input class="knob eq mid" type="range" min="-18" max="18" step=".1" value="0"></div>
        <div class="knobbox">HIGH<br><input class="knob eq high" type="range" min="-18" max="18" step=".1" value="0"></div>
      </div>
    </div>
    <div class="fader-zone"><div class="scale"><span>10</span><span>5</span><span>0</span><span>-5</span><span>-10</span><span>-20</span><span>-30</span><span>-40</span><span>-60</span></div><div class="fader-wrap"><input class="vfader vol" type="range" min="0" max="1.6" step=".01" value="1"></div><div class="meter"><div class="meter-fill"></div></div></div>
    <div class="db val">0.0 dB</div>`;
  mixer.appendChild(el);

  s.el=el; s.canvas=el.querySelector(".wavecanvas"); s.fileText=el.querySelector(".filename span"); s.timeText=el.querySelector(".filename span:last-child"); s.meterFill=el.querySelector(".meter-fill"); s.db=el.querySelector(".val");
  el.querySelector(".solo").onclick=()=>{s.solo=!s.solo; el.querySelector(".solo").classList.toggle("active",s.solo); applyMuteSolo()};
  el.querySelector(".mute").onclick=()=>{s.mute=!s.mute; el.querySelector(".mute").classList.toggle("active",s.mute); applyMuteSolo()};
  el.querySelector(".vol").oninput=e=>{s.volume=+e.target.value; applyMuteSolo(); s.db.textContent=linToDb(s.volume)};
  el.querySelector(".pan").oninput=e=>{s.pan.pan.value=+e.target.value; setKnob(e.target,+e.target.value,-1,1)};
  el.querySelector(".low").oninput=e=>{const v=+e.target.value; s.low.gain.setValueAtTime(v,ctx.currentTime); setKnob(e.target,v,-18,18)};
  el.querySelector(".mid").oninput=e=>{const v=+e.target.value; s.mid.gain.setValueAtTime(v,ctx.currentTime); setKnob(e.target,v,-18,18)};
  el.querySelector(".high").oninput=e=>{const v=+e.target.value; s.high.gain.setValueAtTime(v,ctx.currentTime); setKnob(e.target,v,-18,18)};
}
for(let i=0;i<4;i++) mkStem(i);
document.querySelectorAll("[data-file]").forEach(inp=>inp.onchange=e=>loadFile(+inp.dataset.file,e.target.files[0]));

function setKnob(el,v,min,max){ el.style.setProperty("--val", ((v-min)/(max-min)*75).toFixed(1)); }
document.querySelectorAll(".knob").forEach(k=>setKnob(k,+k.value,+k.min,+k.max));
function linToDb(v){return (20*Math.log10(Math.max(v,.0001))).toFixed(1)+" dB";}
function fmt(t){let m=Math.floor(t/60),s=Math.floor(t%60),ms=Math.floor((t%1)*1000);return `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}.${String(ms).padStart(3,"0")}`}

async function loadFile(i,file){
  if(!file)return; await ctx.resume();
  const arr=await file.arrayBuffer(); const buffer=await ctx.decodeAudioData(arr);
  const s=stems[i]; s.buffer=buffer; s.filename=file.name; s.fileText.textContent=file.name; s.timeText.textContent=fmt(buffer.duration).slice(0,5);
  drawWave(s); drawOverview();
}
function drawWave(s){
  const c=s.canvas, r=c.getBoundingClientRect(); c.width=Math.max(300,r.width*devicePixelRatio); c.height=80*devicePixelRatio;
  const g=c.getContext("2d"), data=s.buffer.getChannelData(0), step=Math.ceil(data.length/c.width), amp=c.height/2;
  g.clearRect(0,0,c.width,c.height); g.strokeStyle=s.color; g.lineWidth=1; g.beginPath();
  for(let x=0;x<c.width;x++){let min=1,max=-1; for(let j=0;j<step;j++){let v=data[(x*step+j)|0]||0; if(v<min)min=v;if(v>max)max=v} g.moveTo(x,(1+min)*amp); g.lineTo(x,(1+max)*amp);}
  g.stroke();
}
function drawOverview(){
  const c=document.getElementById("overview"), r=c.getBoundingClientRect(); c.width=Math.max(600,r.width*devicePixelRatio); c.height=145*devicePixelRatio;
  const g=c.getContext("2d"); g.clearRect(0,0,c.width,c.height);
  stems.forEach((s,idx)=>{ if(!s.buffer)return; const data=s.buffer.getChannelData(0), y=(idx+.5)*c.height/4, h=c.height/9, step=Math.ceil(data.length/c.width);
    g.strokeStyle=s.color; g.globalAlpha=.85; g.beginPath();
    for(let x=0;x<c.width;x++){let min=1,max=-1; for(let j=0;j<step;j++){let v=data[(x*step+j)|0]||0;if(v<min)min=v;if(v>max)max=v} g.moveTo(x,y+min*h); g.lineTo(x,y+max*h);}
    g.stroke(); g.globalAlpha=1;
  });
}
function createSource(s,offset){
  if(!s.buffer)return;
  const src=ctx.createBufferSource();
  const safeOffset=Math.max(0,Math.min(offset||0,Math.max(0,s.buffer.duration-.001)));
  src.buffer=s.buffer;
  src.loop=loop;
  src.connect(s.gain);
  s.src=src;
  try{src.start(0,safeOffset)}catch(err){console.warn("Source start failed",err)}
}
async function play(){
  if(playing)return;
  if(!stems.some(s=>s.buffer)){alert("Bitte zuerst mindestens eine Audio-Datei importieren.");return}
  await ctx.resume();
  applyMuteSolo();
  startAt=ctx.currentTime-pauseAt;
  stems.forEach(s=>{if(s.buffer)createSource(s,pauseAt)});
  playing=true;
  requestAnimationFrame(tick);
}
function stop(){stems.forEach(s=>{try{s.src&&s.src.stop()}catch(e){}}); playing=false; pauseAt=0; updateTime(0)}
function pause(){stems.forEach(s=>{try{s.src&&s.src.stop()}catch(e){}}); pauseAt=ctx.currentTime-startAt; playing=false}
function tick(){ if(!playing)return; const t=ctx.currentTime-startAt; updateTime(t); meters(); requestAnimationFrame(tick);}
function updateTime(t){document.getElementById("timeNow").textContent=fmt(t); const len=maxDur(); document.getElementById("playhead").style.left=(len?Math.min(100,t/len*100):0)+"%";}
function maxDur(){return Math.max(0,...stems.map(s=>s.buffer?s.buffer.duration:0))}
function applyMuteSolo(){
  const anySolo=stems.some(s=>s.solo);
  stems.forEach(s=>{s.gain.gain.value=(s.mute || (anySolo&&!s.solo))?0:s.volume});
}
function meters(){
  const arr=new Uint8Array(256);
  stems.forEach(s=>{s.meter.getByteFrequencyData(arr); const avg=arr.reduce((a,b)=>a+b,0)/arr.length/255; s.meterFill.style.height=Math.min(100,avg*180)+"%"});
  analyser.getByteFrequencyData(arr); const avg=arr.reduce((a,b)=>a+b,0)/arr.length/255; document.getElementById("masterMeter").style.height=Math.min(100,avg*180)+"%";
}
document.getElementById("playBtn").onclick=async()=>playing?pause():await play();
document.getElementById("stopBtn").onclick=stop;
document.getElementById("loopBtn").onclick=e=>{loop=!loop;e.target.classList.toggle("active",loop)};
document.getElementById("soloClear").onclick=()=>{stems.forEach(s=>{s.solo=false;s.el.querySelector(".solo").classList.remove("active")});applyMuteSolo()};
document.getElementById("muteClear").onclick=()=>{stems.forEach(s=>{s.mute=false;s.el.querySelector(".mute").classList.remove("active")});applyMuteSolo()};
document.getElementById("resetMix").onclick=()=>location.reload();
document.getElementById("importAll").onclick=()=>document.querySelector('[data-file="0"]').click();
document.getElementById("masterVol").oninput=e=>{
  const v=+e.target.value;
  masterOut.gain.setValueAtTime(v,ctx.currentTime);
  const read=linToDb(v);
  document.getElementById("masterRead").textContent=read;
  document.getElementById("masterVolRead").textContent=read;
};

document.getElementById("saveMix").onclick=()=>{
 const mix={stems:stems.map(s=>({name:s.name,volume:s.volume,pan:s.pan.pan.value,low:s.low.gain.value,mid:s.mid.gain.value,high:s.high.gain.value,mute:s.mute,solo:s.solo})),master:{vol:masterOut.gain.value}};
 downloadBlob(new Blob([JSON.stringify(mix,null,2)],{type:"application/json"}),"ymc-mix.json");
};
document.getElementById("loadMixBtn").onclick=()=>document.getElementById("loadMixFile").click();
document.getElementById("loadMixFile").onchange=async e=>{const mix=JSON.parse(await e.target.files[0].text()); alert("Mix geladen. Audio-Dateien bitte bei Bedarf erneut importieren.");};
function downloadBlob(blob,name){const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}

document.getElementById("exportWav").onclick=async()=>{
 const len=Math.ceil(maxDur()*ctx.sampleRate); if(!len){alert("Bitte zuerst Stems importieren.");return}
 const off=new OfflineAudioContext(2,len,ctx.sampleRate);
 const dest=off.createGain(); dest.gain.value=masterOut.gain.value; dest.connect(off.destination);
 stems.forEach(s=>{
   if(!s.buffer||s.mute)return;
   const src=off.createBufferSource(); src.buffer=s.buffer;
   const g=off.createGain(); g.gain.value=s.volume;
   const low=off.createBiquadFilter(); low.type="lowshelf"; low.frequency.value=180; low.gain.value=s.low.gain.value;
   const mid=off.createBiquadFilter(); mid.type="peaking"; mid.frequency.value=1400; mid.Q.value=.9; mid.gain.value=s.mid.gain.value;
   const high=off.createBiquadFilter(); high.type="highshelf"; high.frequency.value=3500; high.gain.value=s.high.gain.value;
   const p=off.createStereoPanner(); p.pan.value=s.pan.pan.value;
   src.connect(g); g.connect(low); low.connect(mid); mid.connect(high); high.connect(p); p.connect(dest); src.start(0);
 });
 const rendered=await off.startRendering(); downloadBlob(bufferToWav(rendered),"ymc-mix.wav");
};
function bufferToWav(buffer){
 const ch=buffer.numberOfChannels, len=buffer.length*ch*2+44, ab=new ArrayBuffer(len), v=new DataView(ab);
 const wr=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i))}; let o=0;
 wr(o,"RIFF");o+=4;v.setUint32(o,len-8,true);o+=4;wr(o,"WAVE");o+=4;wr(o,"fmt ");o+=4;v.setUint32(o,16,true);o+=4;v.setUint16(o,1,true);o+=2;v.setUint16(o,ch,true);o+=2;v.setUint32(o,buffer.sampleRate,true);o+=4;v.setUint32(o,buffer.sampleRate*ch*2,true);o+=4;v.setUint16(o,ch*2,true);o+=2;v.setUint16(o,16,true);o+=2;wr(o,"data");o+=4;v.setUint32(o,len-o-4,true);o+=4;
 for(let i=0;i<buffer.length;i++)for(let c=0;c<ch;c++){let sample=Math.max(-1,Math.min(1,buffer.getChannelData(c)[i]));v.setInt16(o,sample<0?sample*0x8000:sample*0x7FFF,true);o+=2}
 return new Blob([ab],{type:"audio/wav"});
}
["dragenter","dragover"].forEach(ev=>app.addEventListener(ev,e=>{e.preventDefault();app.classList.add("drop")}));
["dragleave","drop"].forEach(ev=>app.addEventListener(ev,e=>{e.preventDefault();app.classList.remove("drop")}));
app.addEventListener("drop",e=>[...e.dataTransfer.files].slice(0,4).forEach((f,i)=>loadFile(i,f)));
addEventListener("resize",()=>{stems.forEach(s=>s.buffer&&drawWave(s));drawOverview()});
